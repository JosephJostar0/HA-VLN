# docker-compose-template.yml
# -------------------------------------------------------------------------
# HA-VLN Challenge 2026 - Local Evaluation Template
# Instructions:
# 1. Rename this file to `docker-compose.yml`
# 2. Modify the absolute paths on the LEFT side of the colon under `volumes`
# 3. Run `docker-compose up` to start the local evaluation.
# -------------------------------------------------------------------------

services:
  evaluator:
    image: your_org/havln-eval-image:v1    # Official evaluation image name
    container_name: havln_challenge_eval
    shm_size: '16gb'                       # Optional: Prevents shared memory overflow during high-res rendering or multi-process RL
    
    # Execute the participant's startup script
    command: bash /app/agent/run.sh
    
    environment:
      # Force headless rendering and single GPU setting
      - EGL_DEVICE_ID=0
      - CUDA_VISIBLE_DEVICES=0
      - DISPLAY=""
      
    volumes:
      # 1. Test set mount (Official hidden data / Participant's local data) -> Forced Read-Only (:ro)
      # [MODIFY THIS] Replace the path on the left with your local Data absolute path
      - /path/to/your/local/Data:/app/Data:ro
      
      # 2. Participant code mount -> Forced Read-Only (:ro) for integrity
      # [MODIFY THIS] Replace the path on the left with your extracted submission absolute path
      - /path/to/your/submission:/app/agent:ro
      
      # 3. Evaluation results output directory -> Read-Write (:rw)
      # [MODIFY THIS] Replace the path on the left with the absolute path where you want to save result.json
      - /path/to/your/output_dir:/app/result:rw

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1                 # Evaluation default allocation: 1 GPU
              capabilities: [gpu]
