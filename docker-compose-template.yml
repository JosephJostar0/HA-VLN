# docker-compose-template.yml
# -------------------------------------------------------------------------
# HA-VLN Challenge 2026 - Official Image Evaluation Template
# Instructions:
# 1. Rename this file to `docker-compose.yml`
# 2. Pull the official image: `docker pull ghcr.io/josephjostar0/havln-eval-image:latest`
# 3. Set the host-side paths below or export the corresponding environment variables
# 4. Optional: enable a custom Python package index if your network environment needs it
# 5. Run `docker compose up -d` to start the container
# 6. Attach a shell with `docker compose exec evaluator bash`
# 7. Start the evaluation manually with `bash /app/agent/run.sh`
# -------------------------------------------------------------------------

services:
  evaluator:
    image: ghcr.io/josephjostar0/havln-eval-image:latest
    # Optional: uncomment to force a fixed container name for local debugging.
    # container_name: havln_challenge_eval
    # shm_size: '16gb'                       # Optional: Prevents shared memory overflow during rendering/RL

    # Request access to all available GPUs.
    gpus: all
    # If your local Docker/NVIDIA setup does not honor `gpus: all`, comment the line above
    # and uncomment the fallback below.
    # runtime: nvidia

    # Keep the container alive for manual interactive validation.
    # To run evaluation after the container starts:
    #   docker compose exec evaluator bash
    #   bash /app/agent/run.sh
    command: bash -lc "sleep infinity"
    # Optional: if you prefer a non-interactive startup, replace the command above with `bash /app/agent/run.sh`.

    stdin_open: true
    tty: true

    environment:
      # Optional: uncomment and replace with a regional mirror if direct PyPI access is slow.
      # - PIP_INDEX_URL=https://your.preferred.pypi.mirror/simple
      # Default to rendering on the first visible GPU.
      # If you want a different render GPU, export HAVLN_EGL_DEVICE_ID before `docker compose up`.
      - EGL_DEVICE_ID=${HAVLN_EGL_DEVICE_ID:-0}
      # Default to a single visible GPU. To enable multi-GPU runs, export for example:
      #   HAVLN_CUDA_VISIBLE_DEVICES=0,1
      # To keep all GPUs visible inside the container, comment out the line below.
      - CUDA_VISIBLE_DEVICES=${HAVLN_CUDA_VISIBLE_DEVICES:-0}
      - DISPLAY=""
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HABITAT_SIM_V0_PIN_EGL_DEVICE=1
      - __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libEGL.so.1:/usr/lib/x86_64-linux-gnu/libGLdispatch.so.0

    volumes:
      # 1. Challenge Data Mount -> Read-Write (:rw)
      # Replace the default placeholder or export HAVLN_DATA_DIR before running Compose.
      # This mount must stay writable because HA-VLN may generate mesh-related artifacts under Data.
      - ${HAVLN_DATA_DIR:-/path/to/your/local/Data}:/app/Data:rw

      # 2. Submission/Agent Mount -> Read-Write (:rw) to match the current validated server setup
      # Replace the default placeholder or export HAVLN_AGENT_DIR before running Compose.
      - ${HAVLN_AGENT_DIR:-/path/to/your/submission}:/app/agent:rw

      # 3. Evaluation Results Output -> Read-Write (:rw)
      # Replace the default placeholder or export HAVLN_RESULT_DIR before running Compose.
      - ${HAVLN_RESULT_DIR:-/path/to/your/output_dir}:/app/result:rw
