# docker-compose-template.yml
# -------------------------------------------------------------------------
# HA-VLN Challenge 2026 - Official Image Evaluation Template
# Instructions:
# 1. Rename this file to `docker-compose.yml`
# 2. Pull the official image: `docker pull ghcr.io/josephjostar0/havln-eval-image:latest`
# 3. Modify the absolute paths on the LEFT side of the colon under `volumes`
# 4. Run `docker-compose up` to start the evaluation.
# -------------------------------------------------------------------------

services:
  evaluator:
    image: ghcr.io/josephjostar0/havln-eval-image:latest
    container_name: havln_challenge_eval
    # shm_size: '16gb'                       # Optional: Prevents shared memory overflow during rendering/RL

    # Execute the participant's starting script
    command: bash /app/agent/run.sh

    environment:
      # Force headless EGL rendering and single GPU assignment
      - EGL_DEVICE_ID=0
      - CUDA_VISIBLE_DEVICES=0
      - DISPLAY=""
      - NVIDIA_DRIVER_CAPABILITIES=all
      - HABITAT_SIM_V0_PIN_EGL_DEVICE=1
      - __EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/10_nvidia.json
      - __GLX_VENDOR_LIBRARY_NAME=nvidia
      - LD_PRELOAD=/usr/lib/x86_64-linux-gnu/libEGL.so.1:/usr/lib/x86_64-linux-gnu/libGLdispatch.so.0

    volumes:
      # 1. Challenge Data Mount -> Forced Read-Only (:ro)
      # [MODIFY THIS] Replace the left side with your absolute path to the Data directory
      - /path/to/your/local/Data:/app/Data:ro

      # 2. Submission/Agent Mount -> Read-Write (:rw) to match the current validated server setup
      # [MODIFY THIS] Replace the left side with your absolute path to the unzipped submission
      - /path/to/your/submission:/app/agent:rw

      # 3. Evaluation Results Output -> Read-Write (:rw)
      # [MODIFY THIS] Replace the left side with your absolute path to store exported outputs
      - /path/to/your/output_dir:/app/result:rw

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [all]
