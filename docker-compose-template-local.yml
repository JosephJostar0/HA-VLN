# docker-compose-template-local.yml
# -------------------------------------------------------------------------
# HA-VLN Challenge - Local Build & Evaluation Template
# Instructions:
# 1. Rename this file to `docker-compose.yml`
# 2. Ensure your `Dockerfile` is located in the same directory.
# 3. Modify the absolute paths on the LEFT side of the colon under `volumes`
# 4. Run `docker-compose up --build` to build the image locally and start the evaluation.
# -------------------------------------------------------------------------

services:
  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    image: havln-eval-local:v1
    container_name: havln_challenge_eval_local
    shm_size: '16gb'                       # Prevents shared memory overflow during rendering/RL
    
    # Execute the participant's starting script
    command: bash /app/agent/run.sh
    
    environment:
      # Force headless EGL rendering and single GPU assignment
      - EGL_DEVICE_ID=0
      - CUDA_VISIBLE_DEVICES=0
      - DISPLAY=""
      
    volumes:
      # 1. Test Data Mount -> Forced Read-Only (:ro)
      # [MODIFY THIS] Replace the left side with your absolute path to the Data directory
      - /path/to/your/local/Data:/app/Data:ro
      
      # 2. Submission/Agent Mount -> Forced Read-Only (:ro) to prevent tampering
      # [MODIFY THIS] Replace the left side with your absolute path to the unzipped submission
      - /path/to/your/submission:/app/agent:ro
      
      # 3. Evaluation Results Output -> Read-Write (:rw)
      # [MODIFY THIS] Replace the left side with your absolute path to save result.json
      - /path/to/your/output_dir:/app/result:rw

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1                 # Allocate 1 GPU for evaluation
              capabilities: [gpu]